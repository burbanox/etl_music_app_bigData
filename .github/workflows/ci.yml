name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
      - name: Run unit tests
        run: pytest -q
      - name: Validate deploy config loading
        run: |
          ANALYTICS_BUCKET=ci-bucket \
          GLUE_ROLE_ARN=arn:aws:iam::123456789012:role/glue-role \
          python -m chinook_analytics.deploy --dry-run
